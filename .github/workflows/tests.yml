name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest  

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run tests
        run: python -m unittest discover -s tests
